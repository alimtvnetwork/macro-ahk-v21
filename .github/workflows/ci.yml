# ──────────────────────────────────────────────────────────────
# Marco Extension — CI Pipeline (main branch)
#
# Pipeline structure:
#   1. setup        — checkout, install, lint, test
#   2. build-sdk    — build Marco SDK (dependency for others)
#   3. build-standalone (parallel) — XPath, Macro Controller, Prompts
#   4. build-extension — final Chrome extension build
#
# Performance: Every job caches the pnpm content-addressable store
# AND node_modules keyed on pnpm-lock.yaml, so cached runs install
# in ~10 seconds instead of ~2 minutes. fetch-depth: 1 keeps clones small.
#
# NOTE: No email or notification integrations — by design.
# ──────────────────────────────────────────────────────────────

name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-main-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1: Setup, Lint, Test
  # ════════════════════════════════════════════════════════════
  setup:
    name: Setup · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Enforce lowercase .md filenames
        run: |
          VIOLATIONS=$(find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './skipped/*' \
            | grep '[A-Z]' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Uppercase .md filenames found — all .md files must be lowercase hyphen-case:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ All .md filenames are lowercase"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-setup-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-setup-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Run root lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

  # ════════════════════════════════════════════════════════════
  # Job 2: Build SDK (dependency for other standalone scripts)
  # ════════════════════════════════════════════════════════════
  build-sdk:
    name: Build · Marco SDK
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-sdk-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-sdk-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Build Marco SDK
        run: pnpm run build:sdk

      - name: Upload SDK dist
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3a: Build XPath (parallel with 3b, 3c)
  # ════════════════════════════════════════════════════════════
  build-xpath:
    name: Build · XPath
    needs: build-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-xpath-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-xpath-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Build XPath
        run: pnpm run build:xpath

      - name: Upload XPath dist
        uses: actions/upload-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3b: Build Macro Controller (parallel with 3a, 3c)
  # ════════════════════════════════════════════════════════════
  build-macro-controller:
    name: Build · Macro Controller
    needs: build-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-mc-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-mc-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Build Macro Controller
        run: pnpm run build:macro-controller

      - name: Upload Macro Controller dist
        uses: actions/upload-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3c: Build Prompts (parallel with 3a, 3b)
  # ════════════════════════════════════════════════════════════
  build-prompts:
    name: Build · Prompts
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-prompts-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-prompts-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Build Prompts
        run: pnpm run build:prompts

      - name: Upload Prompts
        uses: actions/upload-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 4: Build Chrome Extension (depends on all standalone)
  # ════════════════════════════════════════════════════════════
  build-extension:
    name: Build · Chrome Extension
    needs: [build-sdk, build-xpath, build-macro-controller, build-prompts]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-ext-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-ext-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Download XPath dist
        uses: actions/download-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/

      - name: Download Macro Controller dist
        uses: actions/download-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/

      - name: Download Prompts
        uses: actions/download-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/

      - name: Build Chrome extension
        run: pnpm run build:extension

      - name: Verify no source maps in dist
        run: |
          MAP_FILES=$(find chrome-extension/dist -name '*.map' 2>/dev/null || true)
          if [ -n "$MAP_FILES" ]; then
            echo "::error::Source map files found in dist — production builds must not include .map files:"
            echo "$MAP_FILES"
            exit 1
          fi
          echo "✅ No source map files in dist"

      - name: Build summary
        run: |
          echo "=== CI Build Complete ==="
          echo "Commit: ${GITHUB_SHA:0:8}"
          echo "Lint: OK | Tests: OK | Build: OK | No source maps: OK"
